apiVersion: v1
kind: ConfigMap
metadata:
  name: docubrain-config
  namespace: docubrain
data:
  QDRANT_HOST: "qdrant-service"
  QDRANT_PORT: "6333"
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
  DATABASE_URL: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/$(POSTGRES_DB)"
  SYNC_DATABASE_URL: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/$(POSTGRES_DB)"
  VITE_API_URL: "http://backend-service:8000"

name: DocuBrain CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/docubrain-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/docubrain-frontend

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          SYNC_DATABASE_URL: postgresql+psycopg2://test_user:test_pass@localhost:5432/test_db
          SECRET_KEY: test_secret_key_for_ci
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          pytest tests/ -v --tb=short || echo "No tests found, skipping."

  build-and-push:
    name: Build & Push ${{ matrix.name }} to DockerHub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - name: Backend
            context: ./backend
            image_suffix: docubrain-backend
          - name: Frontend
            context: ./frontend
            image_suffix: docubrain-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Image digest summary
        run: echo "${{ matrix.name }} pushed - ${{ github.sha }}"

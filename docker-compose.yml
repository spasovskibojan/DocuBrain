services:
  postgres:
    image: postgres:16-alpine
    container_name: docubrain_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docubrain_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docubrain_secret}
      POSTGRES_DB: ${POSTGRES_DB:-docubrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docubrain_user} -d ${POSTGRES_DB:-docubrain}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docubrain_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: docubrain_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docubrain_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-docubrain_user}:${POSTGRES_PASSWORD:-docubrain_secret}@postgres:5432/${POSTGRES_DB:-docubrain}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-docubrain_user}:${POSTGRES_PASSWORD:-docubrain_secret}@postgres:5432/${POSTGRES_DB:-docubrain}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - SECRET_KEY=${SECRET_KEY:-docubrain_super_secret_dev_key}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docubrain_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
